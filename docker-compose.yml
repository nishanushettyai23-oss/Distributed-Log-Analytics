services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: distributed-log-analytics-api:latest
    environment:
      PROJECT_ID: ${PROJECT_ID:-distributed-log-analytics}
      REGION: ${REGION:-us-central1}
      CLUSTER_NAME: ${CLUSTER_NAME:-log-analytics-cluster}
      DATAPROC_WORKERS: ${DATAPROC_WORKERS:-2}
      DATAPROC_MACHINE_TYPE: ${DATAPROC_MACHINE_TYPE:-n2-standard-2}
      RAW_BUCKET: ${RAW_BUCKET:-distributed-log-analytics-raw-logs}
      OUTPUT_BUCKET: ${OUTPUT_BUCKET:-distributed-log-analytics-spark-output}
      BQ_DATASET: ${BQ_DATASET:-logs_dataset}
      BQ_TABLE: processed_logs
      PROCESSED_RECORDS: 10685241
      PIPELINE_ADMIN_TOKEN: ${PIPELINE_ADMIN_TOKEN:-}
      SPARK_JOB_URI: ${SPARK_JOB_URI:-gs://distributed-log-analytics-spark-code/jobs/spark_job.py}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-2147483648}
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/health')"]
      interval: 20s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: distributed-log-analytics-web:latest
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:80"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_started
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
